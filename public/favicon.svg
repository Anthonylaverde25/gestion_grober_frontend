<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(15, 15)">
    <!-- Layer 1: Metallic Grey Base -->
    <rect x="25" y="10" width="50" height="60" fill="#94a3b8" fill-opacity="0.2" stroke="#64748b" stroke-width="1.5" rx="2" transform="skewX(-10)"/>
    <!-- Layer 2: Soft Glass Blue -->
    <rect x="12" y="5" width="50" height="60" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-width="1.5" rx="2" transform="skewX(-5)"/>
    <!-- Layer 3: Vibrant Glass Highlight -->
    <rect x="0" y="0" width="50" height="60" fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="2" rx="2"/>
    
    <!-- Refraction Line Details -->
    <line x1="5" y1="5" x2="45" y2="55" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="10" y1="0" x2="50" y2="50" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  </g>
</svg>
